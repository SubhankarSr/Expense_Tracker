<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Expense Dashboard
</title>

<link rel="stylesheet"
href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<nav class="navbar">

<h2>
💰 Expense Dashboard
</h2>

<div>

<button id="themeBtn">
🌙
</button>

<button id="logoutBtn">
Logout
</button>

</div>

</nav>


<div class="container">


<div class="card welcome-card">

<h2>
Welcome Back 👋
</h2>

<p>
Track your expenses smarter and manage your budget efficiently
</p>

</div>

<div class="cards">

<div class="card">

<h3>
Total Expense
</h3>

<p id="totalExpense">
₹0
</p>

</div>


<div class="card">

<h3>
Transactions
</h3>

<p id="totalTransactions">
0
</p>

</div>


<div class="card">

<h3>
Average Expense
</h3>

<p id="averageExpense">
₹0
</p>

</div>

</div>
<div class="expense-form">

<h2>
Add Expense
</h2>

<form id="expenseForm">

<input
type="number"
id="amount"
placeholder="Amount"
required>

<select
id="category"
required>

<option value="">
Select Category
</option>

<option>🍔 Food</option>
<option>✈️ Travel</option>
<option>🛒 Shopping</option>
<option>💡 Bills</option>

</select>


<input
type="date"
id="date"
required>

<input
type="text"
id="description"
placeholder="Description"
required>


<select
id="payment"
required>

<option>Cash</option>
<option>UPI</option>
<option>Card</option>

</select>

<button type="submit">

Add Expense

</button>

</form>

</div>

<div class="searchBox">

<input
type="text"
id="search"
placeholder="Search transactions...">

</div>
<div class="filters">

<select id="filterCategory">

<option value="all">
All Categories
</option>

<option value="🍔 Food">🍔 Food</option>

<option value="✈️ Travel">✈️ Travel</option>

<option value="🛒 Shopping">🛒 Shopping</option>

<option value="💡 Bills">💡 Bills</option>

</select>


<input
type="number"
id="minAmount"
placeholder="Min Amount">

<input
type="number"
id="maxAmount"
placeholder="Max Amount">


<select id="sortDate">

<option value="new">
Newest First
</option>

<option value="old">
Oldest First
</option>

</select>


<button id="applyFilter">

Apply Filter

</button>


<button id="resetBtn">

Reset

</button>

</div>


<div class="filters">

<button id="exportBtn">

Export CSV

</button>

<button id="clearBtn">

Clear All

</button>

</div>
<div style="overflow-x:auto;">

<table>

<thead>

<tr>

<th>Amount</th>
<th>Category</th>
<th>Date</th>
<th>Description</th>
<th>Payment</th>
<th>Action</th>

</tr>

</thead>

<tbody id="tbody">

</tbody>

</table>

</div>
<div class="chart-container">

<canvas
id="expenseChart">

</canvas>

</div>


<footer style="text-align:center;margin-top:30px;padding:20px;opacity:.7;">

Created by Subhankar Srivastava

</footer>

</div>

<script src="script.js"></script>
<script src="chart.js"></script>

</body>
</html>
